name: Fetch Motion Design Jobs Daily

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 6:00 AM UTC (midnight–2am EST)
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch jobs
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY:   ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_jobs.py

      - name: Commit updated jobs data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "chore: refresh job data $(date -u +'%Y-%m-%d')"
          git push
